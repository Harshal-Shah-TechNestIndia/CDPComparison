<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>Compare JSON QA Files</title>
<style>
body {
  font-family: Arial;
  background: #f7f7f7;
  margin: 0;
  padding: 20px 40px;
}

h1 {
  margin-top: 10px;
  margin-bottom: 30px;
  font-size: 26px;
}

.container-row {
  display: flex;
  gap: 40px;
}

.card {
  background: white;
  padding: 20px;
  border-radius: 12px;
  box-shadow: 0 4px 20px rgba(0,0,0,0.08);
  width: 100%;
}

.card h2 {
  margin-top: 0;
  font-size: 20px;
}

.select-row {
  display: flex;
  gap: 12px;
  margin-bottom: 15px;
}

.qa-box {
  border: 1px solid #ddd;
  border-radius: 8px;
  padding: 15px;
  min-height: 160px;
  background: #fafafa;
}

.summary-box {
  background: white;
  padding: 20px;
  margin-top: 40px;
  border-radius: 12px;
  box-shadow: 0 3px 14px rgba(0,0,0,0.06);
}

.qa-card {
  border: 1px solid #e5e7eb;
  border-left: 4px solid #6c5ce7;
  border-radius: 8px;
  background: #fff;
  padding: 10px 12px;
  margin: 8px 0;
}
.qa-card .sec { font-weight: 700; color: #374151; margin-bottom: 6px; }
.qa-card .q   { margin: 6px 0; }
.qa-card .a   { margin: 6px 0; color: #1f2937; }
</style>
</head>
<body>
<div style="
  background:#fff;
  padding:15px 25px;
  border-radius:10px;
  margin-bottom:25px;
  display:flex;
  justify-content:space-between;
">
  <div style="font-size:20px; font-weight:bold;">Compare CDP Reports</div>
  <div>
     <a href="/" style="margin-right:20px;">Generate JSON</a>
     <a href="/compare" style="font-weight:bold;">Compare JSON</a>
  </div>
</div>

<!-- <h1>Compare CDP Reports</h1> -->

<div class="container-row">

  <!-- Left Panel -->
  <div class="card">
    <h2 id="company1">Choose JSON File 1</h2>

    <div class="select-row">
      <select id="file1"></select>
      <select id="section1"><option value="">Select section</option></select>
    </div>

    <!-- <div class="qa-box">
      <b>Question:</b><div id="q1"></div><br>
      <b>Answer:</b><div id="a1"></div>
    </div> -->

    <!-- LEFT -->
    <div id="multiLeft" style="margin-top:12px;"></div>
  </div>

  <!-- Right Panel -->
  <div class="card">
    <h2 id="company2">Choose JSON File 2</h2>

    <div class="select-row">
      <select id="file2"></select>
      <select id="section2"><option value="">Select section</option></select>
    </div>

    <!-- <div class="qa-box">
      <b>Question:</b><div id="q2"></div><br>
      <b>Answer:</b><div id="a2"></div>
    </div> -->

    <!-- RIGHT -->
    <div id="multiRight" style="margin-top:12px;"></div>
  </div>

</div>

<!-- Summary -->
<div class="summary-box">
  <h3>Summary</h3>
  <div><b>Common Rules:</b> <span id="sum-common"></span></div>
  <div><b>Total Rules in File 1:</b> <span id="sum-file1"></span></div>
  <div><b>Total rules in File 2:</b> <span id="sum-file2"></span></div>
  <!-- <div><b>Checkbox-type answers:</b> <span id="sum-checkbox"></span></div>
  <div><b>Descriptive-type answers:</b> <span id="sum-descriptive"></span></div> -->


  <div style="margin-top:25px; margin-bottom:20px; text-align:center;">
    <button id="genSummaryBtn"
            style="padding:10px 18px; border:1px solid #666; border-radius:8px; background:white; cursor:pointer;">
        Generate AI Summary
    </button>
</div>


<div id="sectionSummary"
     style="margin-top:20px; padding:10px; background:#fafafa; border-radius:8px; min-height:20px;">
</div>

  </div>

</div>


<script>
/* Cache for JSON contents */
const cache = new Map();

/* Section maps keyed by filename */
const sectionMapByFile = new Map();

/* When DOM loads, get file list */
document.addEventListener("DOMContentLoaded", () => {
    loadJsonFiles();

    file1.addEventListener("change", loadSectionsIfBothSelected);
    file2.addEventListener("change", loadSectionsIfBothSelected);

// REMOVE:
// section1.addEventListener("change", () => showQA("file1", "section1", "q1", "a1"));
// section2.addEventListener("change", () => showQA("file2", "section2", "q2", "a2"));

// ADD synced listeners:
let syncing = false;


section1.addEventListener("change", async () => {
  if (syncing) return;
  syncing = true;
  // sync both selects
  section2.value = section1.value;

  const selected = section1.value;
  const f1 = file1.value;
  const f2 = file2.value;

  if (!selected || !f1 || !f2) { syncing = false; return; }

  // load the common list again OR use your cached common array if you keep it
  const commonRes = await fetch(`/common_sections?file1=${encodeURIComponent(f1)}&file2=${encodeURIComponent(f2)}`).then(r => r.json());
  const commonList = commonRes.common_sections || [];

  // compute all sections under the same top-level group
  const groupSections = sectionsForTopLevel(selected, commonList);

  // load JSONs (your loadJson() already caches)
  const [js1, js2] = await Promise.all([loadJson(f1), loadJson(f2)]);

  // render multi-pairs under each company card (make sure you have #multiLeft and #multiRight in HTML)
  renderGroupQAs("multiLeft",  js1, groupSections);
  renderGroupQAs("multiRight", js2, groupSections);

  // (Optional) also show the FIRST section of the group in the single-pair area to keep existing card UI useful
  if (groupSections.length) {
    section1.value = groupSections[0];
    section2.value = groupSections[0];
    showQA("file1", "section1", "q1", "a1");
    showQA("file2", "section2", "q2", "a2");
  }

  syncing = false;
});

section2.addEventListener("change", async () => {
  if (syncing) return;
  syncing = true;
  section1.value = section2.value;

  const selected = section2.value;
  const f1 = file1.value;
  const f2 = file2.value;

  if (!selected || !f1 || !f2) { syncing = false; return; }

  const commonRes = await fetch(`/common_sections?file1=${encodeURIComponent(f1)}&file2=${encodeURIComponent(f2)}`).then(r => r.json());
  const commonList = commonRes.common_sections || [];

  const groupSections = sectionsForTopLevel(selected, commonList);

  const [js1, js2] = await Promise.all([loadJson(f1), loadJson(f2)]);
  renderGroupQAs("multiLeft",  js1, groupSections);
  renderGroupQAs("multiRight", js2, groupSections);

  if (groupSections.length) {
    section1.value = groupSections[0];
    section2.value = groupSections[0];
    showQA("file1", "section1", "q1", "a1");
    showQA("file2", "section2", "q2", "a2");
  }

  syncing = false;
});
});

/* ------------------------------ */
/* Load list of available JSONs   */
/* ------------------------------ */
function loadJsonFiles() {
    fetch("/list_json")
        .then(r => r.json())
        .then(data => {
            fillDropdown(file1, data.files);
            fillDropdown(file2, data.files);
        });
}

function fillDropdown(sel, files) {
    sel.innerHTML = '<option value="">Select JSON file</option>';
    files.forEach(f => {
        const opt = document.createElement("option");
        opt.value = f;
        opt.textContent = f;
        sel.appendChild(opt);
    });
}


function buildTopLevelGroups(sections) {
  const groups = new Set();
  sections.forEach(sec => {
    const top = sec.split(".")[0];
    if (/^\d+$/.test(top)) groups.add(top);
  });
  return Array.from(groups).sort((a,b) => parseInt(a)-parseInt(b));
}


/* ---------------------------------------------------------- */
/* MAIN CHANGE: load sections ONLY WHEN BOTH FILES SELECTED   */
/* ---------------------------------------------------------- */
function loadSectionsIfBothSelected() {
    const f1 = file1.value;
    const f2 = file2.value;

    if (!f1 || !f2) {
        section1.innerHTML = '<option value="">drop down to select section</option>';
        section2.innerHTML = '<option value="">drop down to select section</option>';
        return;
    }

    // 1) fetch common sections
    fetch(`/common_sections?file1=${f1}&file2=${f2}`)
        .then(r => r.json())
        .then(data => {
            const common = data.common_sections || [];

            // Populate both dropdowns
            populateSectionDropdown(section1, common);
            populateSectionDropdown(section2, common);

            // 2) Load both JSON files to compute summary
            Promise.all([loadJson(f1), loadJson(f2)])
                .then(([js1, js2]) => {
                    const sec1 = extractSections(js1);
                    const sec2 = extractSections(js2);

                    const { checkboxCount, descriptiveCount } = countAnswerTypes(js1, js2);

                    // Summary update
                    document.getElementById("sum-common").textContent = common.length;
                    document.getElementById("sum-file1").textContent = sec1.size;
                    document.getElementById("sum-file2").textContent = sec2.size;
                    document.getElementById("sum-checkbox").textContent = checkboxCount;
                    document.getElementById("sum-descriptive").textContent = descriptiveCount;
                });
        });
}

function countAnswerTypes(js1, js2) {
    const checkboxMarkers = [
        "☑", "✔", "✓", 
        "Select all that apply",
        "Select from:"
    ];

    let checkboxCount = 0;
    let descriptiveCount = 0;

    function scan(js) {
        Object.keys(js).forEach(key => {
            if (/^\d+$/.test(key)) {
                js[key].forEach(entry => {
                    const ans = (entry.answer || "").trim();
                    if (!ans) return;

                    if (checkboxMarkers.some(m => ans.includes(m)))
                        checkboxCount++;
                    else
                        descriptiveCount++;
                });
            }
        });
    }

    scan(js1);
    scan(js2);

    return { checkboxCount, descriptiveCount };
}

/* -------------------------------------- */
/* Load and cache JSON                    */
/* -------------------------------------- */
function loadJson(filename) {
    if (cache.has(filename)) {
        updateCompanyHeaders(filename, cache.get(filename));
        return Promise.resolve(cache.get(filename));
    }
    return fetch(`/json?file=${filename}`)
        .then(r => r.json())
        .then(js => {
            cache.set(filename, js);
            updateCompanyHeaders(filename, js);
            return js;
        });
}

function updateCompanyHeaders(filename, jsonData) {
    const name = jsonData.company_name || filename.replace("output_", "").replace(".json", "");

    if (file1.value === filename) {
        company1.textContent = `Company: ${name}`;
    }
    if (file2.value === filename) {
        company2.textContent = `Company: ${name}`;
    }
}

/* ---------------------------------------------------- */
/* Extract *all section numbers* from top‑level page keys */
/* ---------------------------------------------------- */
function extractSections(js) {
    const set = new Set();

    Object.keys(js).forEach(key => {
        if (/^\d+$/.test(key)) {
            const arr = js[key];
            arr.forEach(entry => {
                if (entry.section) set.add(entry.section.trim());
            });
        }
    });

    return set;
}

/* Populate dropdown with common sections */
function populateSectionDropdown(sel, sections) {
    sel.innerHTML = '<option value="">drop down to select section</option>';
    sections.forEach(sec => {
        const opt = document.createElement("option");
        opt.value = sec;
        opt.textContent = sec;
        sel.appendChild(opt);
    });
}

/* -------------------- */
/* Show Q/A for a file  */
/* -------------------- */
function showQA(fileSelId, secSelId, qOutId, aOutId) {
    const filename = document.getElementById(fileSelId).value;
    const sectionNo = document.getElementById(secSelId).value;

    if (!filename || !sectionNo) return;

    loadJson(filename).then(js => {
        let found = null;

        Object.keys(js).forEach(k => {
            if (/^\d+$/.test(k)) {
                js[k].forEach(entry => {
                    if (entry.section === sectionNo) {
                        found = entry;
                    }
                });
            }
        });

        document.getElementById(qOutId).textContent = found?.question || "";
        document.getElementById(aOutId).innerHTML = (found?.answer || "").replace(/\n/g, "<br>");
    });
}

/* Sort helper: dotted numbers numerically */
function compareDotted(a, b) {
    const A = a.split(".").map(x => parseInt(x));
    const B = b.split(".").map(x => parseInt(x));
    for (let i = 0; i < Math.max(A.length, B.length); i++) {
        const av = A[i] ?? -1;
        const bv = B[i] ?? -1;
        if (av !== bv) return av - bv;
    }
    return 0;
}

// Find a single Q/A item by exact section in a JSON that uses top-level numeric page keys
function findBySection(js, sectionNo) {
  for (const k of Object.keys(js)) {
    if (/^\d+$/.test(k)) {
      const arr = js[k] || [];
      const hit = arr.find(e => e.section === sectionNo);
      if (hit) return hit;
    }
  }
  return null;
}

// Render MANY Q/As into a container, preserving order by dotted-number compare
function renderGroupQAs(containerId, js, sections) {
  const el = document.getElementById(containerId);
  el.innerHTML = "";
  if (!sections.length) {
    el.textContent = "(No sections in this group)";
    return;
  }
  const sorted = [...sections].sort(compareDotted);
  sorted.forEach(sec => {
    const item = findBySection(js, sec);
    const q = item?.question || "";
    const a = (item?.answer || "").replace(/\n/g, "<br>");
    el.insertAdjacentHTML(
      "beforeend",
      `<div class="qa-card">
         <div class="sec"><b>§ ${sec}</b></div>
         <div class="q"><b>Question:</b><div>${q}</div></div>
         <div class="a"><b>Answer:</b><br>${a}</div>
         
       </div>`
    );
  });
}

// Given the currently selected detailed section (e.g., "7.1.2"),
// return the list of *common* sections that belong to the same top-level group "7"
function sectionsForTopLevel(selectedSection, commonList) {
  if (!selectedSection) return [];
  const top = selectedSection.split(".")[0]; // "7"
  return (commonList || []).filter(sec => sec === top || sec.startsWith(top + "."));
}


// --------------------------------------------------------------------
// Generate Summary Button => Calls our /extract_sections endpoint
// --------------------------------------------------------------------
/** Minimal, dependency-free formatter for our server's summary text.
 *  - Supports #/##/### headings, bullets (- * •), numbered lists, bold/italic/code, links, paragraphs.
 *  - Avoids executing any script by not allowing <script> in the input. */
function formatSummaryTextToHTML(raw) {
  if (!raw || typeof raw !== "string") return "";

  // 0) Normalize newlines
  const text = raw.replace(/\r\n?/g, "\n");

  // 1) Escape HTML first to prevent injection, then we’ll selectively unescape
  //    our own tags that we create below.
  const esc = (s) =>
    s
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;");

  // 2) Line-by-line parse to build blocks (headings, lists, paragraphs)
  const lines = text.split("\n");
  let html = "";
  let inUL = false;
  let inOL = false;

  const closeLists = () => {
    if (inUL) { html += "</ul>"; inUL = false; }
    if (inOL) { html += "</ol>"; inOL = false; }
  };

  // Helper: convert inline markups on a single line (after escaping)
  const renderInline = (s) => {
    // Bold **text**
    s = s.replace(/\*\*(.+?)\*\*/g, "<strong>$1</strong>");
    // Italic _text_
    s = s.replace(/(^|[^_])_([^_]+)_/g, '$1<em>$2</em>');
    // Inline code `code`
    s = s.replace(/`([^`]+)`/g, "<code>$1</code>");
    // Auto-link URLs
    s = s.replace(
      /\b(https?:\/\/[^\s<]+[^\s<\.)])/g,
      '<a href="$1" target="_blank" rel="noopener noreferrer">$1</a>'
    );
    return s;
  };

  for (let i = 0; i < lines.length; i++) {
    const rawLine = lines[i];
    const line = rawLine.trim();

    // Blank line: close lists and add spacing
    if (line === "") {
      closeLists();
      html += "<br/>";
      continue;
    }

    // Headings
    if (/^###\s+/.test(line)) {
      closeLists();
      html += `<h3>${renderInline(esc(line.replace(/^###\s+/, "")))}</h3>`;
      continue;
    }
    if (/^##\s+/.test(line)) {
      closeLists();
      html += `<h2>${renderInline(esc(line.replace(/^##\s+/, "")))}</h2>`;
      continue;
    }
    if (/^#\s+/.test(line)) {
      closeLists();
      html += `<h1>${renderInline(esc(line.replace(/^#\s+/, "")))}</h1>`;
      continue;
    }

    // Numbered list: "1. item"
    if (/^\d+\.\s+/.test(line)) {
      if (inUL) { html += "</ul>"; inUL = false; }
      if (!inOL) { html += "<ol>"; inOL = true; }
      html += `<li>${renderInline(esc(line.replace(/^\d+\.\s+/, "")))}</li>`;
      continue;
    }

    // Bulleted list: "- item", "* item", "• item"
    if (/^(-|\*|•)\s+/.test(line)) {
      if (inOL) { html += "</ol>"; inOL = false; }
      if (!inUL) { html += "<ul>"; inUL = true; }
      html += `<li>${renderInline(esc(line.replace(/^(-|\*|•)\s+/, "")))}</li>`;
      continue;
    }

    // Default: paragraph line
    closeLists();
    html += `<p>${renderInline(esc(line))}</p>`;
  }

  // Close any open list at the end
  closeLists();
  return html;
}


document.getElementById("genSummaryBtn").addEventListener("click", () => {
  const f1 = file1.value;
  const f2 = file2.value;

  if (!f1 || !f2) {
    document.getElementById("sectionSummary").textContent =
      "Please select both JSON files first.";
    return;
  }

  // Hardcode prefix = 7 for now (can be user-editable later)
  const prefix = "7";

  const url =
    `/extract_sections?prefix=${encodeURIComponent(prefix)}`
    + `&file1=${encodeURIComponent(f1)}`
    + `&file2=${encodeURIComponent(f2)}`;

  // Status message: keep as plain text
  const container = document.getElementById("sectionSummary");
  container.textContent = "Generating AI Summary…";

  fetch(url)
    .then((r) => r.json())
    .then((data) => {
      const raw = data?.result || "";
      if (!raw) {
        container.textContent = "(empty)";
        return;
      }

      // Render pretty HTML from the summary
      const formatted = formatSummaryTextToHTML(raw);

      // Now we can safely set innerHTML because we escaped user-provided content
      // and only injected basic tags we created ourselves.
      container.innerHTML = `
        <div class="summary-block">
          ${formatted}
        </div>
      `;
    })
    .catch((err) => {
      container.textContent = "Error: " + err;
    });
});

</script>

</body>
</html>
