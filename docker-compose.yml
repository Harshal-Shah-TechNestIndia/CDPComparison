version: '3.8'

services:
  cdp-app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cdp-app
    env_file:
      - .env
    ports:
      - "5000:5000"
    environment:
      FLASK_ENV: production
      PYTHONUNBUFFERED: "1"
      TZ: Asia/Kolkata
    volumes:
      # Persist uploads folder
      - uploads_data:/app/uploads
    restart: unless-stopped

    healthcheck:
      test: ["CMD", "python", "-c", "import requests; requests.get('http://localhost:5000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

volumes:
  uploads_data: